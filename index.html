<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tapama Beacon Config</title>
    <style>
        html, body, div, span, h1, h2, h3, h4, h5, h6, p, a, button, input, select, textarea, label {
            box-sizing: border-box; margin: 0; padding: 0;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #121212; color: #e0e0e0; padding: 15px; max-width: 600px; margin: auto; line-height: 1.5;
        }
        h2 { text-align: center; color: #ffffff; margin-bottom: 20px; font-size: 22px; padding-top: 10px; }
        button { 
            padding: 14px; width: 100%; margin-top: 10px; cursor: pointer; 
            background: #333333; color: #ffffff; border: 1px solid #444; border-radius: 6px;
            font-weight: bold; font-size: 16px; transition: background 0.2s;
        }
        button:hover { background: #555555; }
        button:disabled { background: #1a1a1a; color: #666666; border-color: #333; cursor: not-allowed; }
        
        #btnDisconnect, #btnFactory { background: #2a2a2a; border-color: #444; }
        #btnReboot { background: #444444; }
        #btnWriteSlot, #btnWriteGlobal { background: #3a3a3a; }

        input[type="text"], input[type="password"], input[type="number"], select { 
            padding: 12px; width: 100%; background: #000000; color: #e0e0e0; 
            border: 1px solid #444444; border-radius: 6px; margin-bottom: 15px;
            font-size: 16px; outline: none;
        }
        input:focus, select:focus { border-color: #888888; }
        input[type="range"] { width: 100%; margin-bottom: 15px; accent-color: #888888; }
        
        .tabs { display: flex; background: #1e1e1e; border-radius: 6px; border: 1px solid #333333; overflow: hidden; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; color: #888888; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom: 2px solid #aaaaaa; color: #ffffff; background: #121212; }
        .tab-content { display: none; padding: 20px; background: #1e1e1e; border: 1px solid #333333; border-radius: 6px; }
        .tab-content.active { display: block; }
        .dynamic-field { display: none; }
        
        #log { 
            background: #000000; padding: 12px; height: 180px; overflow-y: auto; 
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace; 
            color: #aaaaaa; margin-top: 15px; border-radius: 6px; border: 1px solid #333333; font-size: 13px;
        }
        label { font-size: 14px; color: #aaaaaa; display: block; margin-bottom: 6px; font-weight: 500; }
        .val-display { color: #ffffff; font-weight: bold; float: right; }
        hr { border: none; border-top: 1px solid #333333; margin: 20px 0; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(3px); z-index: 1000; }
        .modal-content { background: #1e1e1e; margin: 40% auto; padding: 25px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #444444; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.8); }
        .modal-content h3 { margin-bottom: 15px; color: #e0e0e0; }
    </style>
</head>
<body>
    <h2>Tapama Beacon Config</h2>
    <button id="btnConnect">Connect BLE</button>

    <div id="modalAuth" class="modal">
        <div class="modal-content">
            <h3>Authentication (<span id="timeAuth">20</span>s left)</h3>
            <input type="password" id="inpPassword" placeholder="Enter Password">
            <button id="btnAuth">Unlock</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('tabGeneral')">General</div>
        <div class="tab-btn" onclick="switchTab('tabSlot')">Slot Config</div>
        <div class="tab-btn" onclick="switchTab('tabSys')">System</div>
    </div>

    <div id="tabGeneral" class="tab-content active">
        <p style="margin-bottom: 8px;">Manufacturer: Tapama Tech</p>
        <p style="margin-bottom: 15px;">Hardware: nRF52840</p>
        <label>Allow Connection (Slot 1-6)</label>
        <select id="cfgGlobalConn">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>
        <button id="btnWriteGlobal">Save Global Connectable</button>
    </div>

    <div id="tabSlot" class="tab-content">
        <label>Select Slot (0-6)</label>
        <select id="selSlot">
            <option value="0">Slot 0 (Always Connectable)</option>
            <option value="1">Slot 1</option>
            <option value="2">Slot 2</option>
            <option value="3">Slot 3</option>
            <option value="4">Slot 4</option>
            <option value="5">Slot 5</option>
            <option value="6">Slot 6</option>
        </select>
        <button id="btnReadSlot">Read Slot Data</button>

        <hr>
        
        <label>Slot Status</label>
        <select id="cfgEnabled"><option value="0">Disable</option><option value="1">Enable</option></select>

        <label>Frame Type</label>
        <select id="cfgFrameType">
            <option value="0">NO_DATA</option><option value="1">EDDYSTONE_UID</option>
            <option value="2">EDDYSTONE_URL</option><option value="3">EDDYSTONE_TLM</option>
            <option value="4">IBEACON</option><option value="5">INFO</option>
        </select>

        <label>Interval (ms) <span class="val-display" id="lblInterval">500</span></label>
        <input type="range" id="cfgInterval" min="20" max="10240" step="10" value="500">

        <label>Tx Power (dBm) <span class="val-display" id="lblTxPower">4</span></label>
        <input type="range" id="cfgTxPower" min="0" max="13" step="1" value="9">

        <label>RSSI at 0m/1m <span class="val-display" id="lblRssi">-59</span></label>
        <input type="range" id="cfgRssi" min="-100" max="0" step="1" value="-59">

        <div id="fUid" class="dynamic-field">
            <label>Namespace ID (20 hex chars)</label>
            <input type="text" id="cfgNid" maxlength="20">
            <label>Instance ID (12 hex chars)</label>
            <input type="text" id="cfgIid" maxlength="12">
        </div>

        <div id="fUrl" class="dynamic-field">
            <label>URL String</label>
            <input type="text" id="cfgUrl" maxlength="20">
        </div>

        <div id="fIbc" class="dynamic-field">
            <label>UUID (32 hex chars)</label>
            <input type="text" id="cfgUuid" maxlength="32">
            <label>Major</label><input type="number" id="cfgMaj">
            <label>Minor</label><input type="number" id="cfgMin">
        </div>

        <button id="btnWriteSlot">Write to RAM (Apply)</button>
    </div>

    <div id="tabSys" class="tab-content">
        <button id="btnReboot">Save to Flash & Reboot</button>
        <button id="btnFactory">Factory Reset</button>
    </div>

    <div id="log"></div>

    <script>
        const UUID_SVC = "a3c86500-8ed3-4bdf-8a39-a01bebede295";
        const UUID_AUTH = "a3c86501-8ed3-4bdf-8a39-a01bebede295";
        const UUID_GLOB = "a3c86502-8ed3-4bdf-8a39-a01bebede295";
        const UUID_SEL = "a3c86503-8ed3-4bdf-8a39-a01bebede295";
        const UUID_BASE = "a3c86504-8ed3-4bdf-8a39-a01bebede295";
        const UUID_CMD = "a3c86505-8ed3-4bdf-8a39-a01bebede295";
        const UUID_DATA = "a3c86506-8ed3-4bdf-8a39-a01bebede295";

        const txPowerMap = [-40, -20, -16, -12, -8, -4, 0, 2, 3, 4, 5, 6, 7, 8];

        let bleDevice, bleServer, charAuth, charGlob, charSel, charBase, charData, charCmd;
        let authTimer, timeLeft = 20;

        function log(m) { 
            let d = document.getElementById('log');
            d.innerHTML += m + '<br>'; 
            d.scrollTop = d.scrollHeight;
        }
        
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        document.getElementById('cfgInterval').oninput = (e) => document.getElementById('lblInterval').innerText = e.target.value;
        document.getElementById('cfgRssi').oninput = (e) => document.getElementById('lblRssi').innerText = e.target.value;
        document.getElementById('cfgTxPower').oninput = (e) => document.getElementById('lblTxPower').innerText = txPowerMap[e.target.value];

        document.getElementById('cfgFrameType').onchange = (e) => {
            document.querySelectorAll('.dynamic-field').forEach(el => el.style.display = 'none');
            let v = e.target.value;
            if (v == '1') document.getElementById('fUid').style.display = 'block';
            if (v == '2') document.getElementById('fUrl').style.display = 'block';
            if (v == '4') document.getElementById('fIbc').style.display = 'block';
        };

        document.getElementById('btnConnect').onclick = async () => {
            try {
                bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'tapama' }], optionalServices: [UUID_SVC] });
                bleDevice.addEventListener('gattserverdisconnected', () => {
                    log("Disconnected.");
                    document.getElementById('modalAuth').style.display = 'none';
                    clearInterval(authTimer);
                });
                bleServer = await bleDevice.gatt.connect();
                let svc = await bleServer.getPrimaryService(UUID_SVC);
                charAuth = await svc.getCharacteristic(UUID_AUTH);
                charGlob = await svc.getCharacteristic(UUID_GLOB);
                charSel = await svc.getCharacteristic(UUID_SEL);
                charBase = await svc.getCharacteristic(UUID_BASE);
                charData = await svc.getCharacteristic(UUID_DATA);
                charCmd = await svc.getCharacteristic(UUID_CMD);
                
                document.getElementById('modalAuth').style.display = 'block';
                timeLeft = 20;
                authTimer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timeAuth').innerText = timeLeft;
                    if(timeLeft <= 0) { clearInterval(authTimer); bleDevice.gatt.disconnect(); }
                }, 1000);
                
                let gVal = await charGlob.readValue();
                document.getElementById('cfgGlobalConn').value = gVal.getUint8(0);
                
            } catch(e) { log(e); }
        };

        document.getElementById('btnAuth').onclick = async () => {
            try {
                await charAuth.writeValue(new TextEncoder().encode(document.getElementById('inpPassword').value));
                clearInterval(authTimer);
                document.getElementById('modalAuth').style.display = 'none';
                log("Unlocked.");
            } catch(e) { log(e); }
        };

        document.getElementById('btnWriteGlobal').onclick = async () => {
            await charGlob.writeValue(new Uint8Array([parseInt(document.getElementById('cfgGlobalConn').value)]));
            log("Global Connectable saved.");
        };

        document.getElementById('btnReadSlot').onclick = async () => {
            try {
                await charSel.writeValue(new Uint8Array([parseInt(document.getElementById('selSlot').value)]));
                let baseVal = await charBase.readValue();
                let dataVal = await charData.readValue();
                
                document.getElementById('cfgEnabled').value = baseVal.getUint8(0);
                
                let ft = baseVal.getUint8(1);
                document.getElementById('cfgFrameType').value = ft;
                
                let txPwr = baseVal.getInt8(2);
                let txIdx = txPowerMap.indexOf(txPwr);
                if(txIdx == -1) txIdx = 9;
                document.getElementById('cfgTxPower').value = txIdx;
                document.getElementById('lblTxPower').innerText = txPwr;

                let rssi = baseVal.getInt8(3);
                document.getElementById('cfgRssi').value = rssi;
                document.getElementById('lblRssi').innerText = rssi;

                let interval = baseVal.getUint16(4, true);
                document.getElementById('cfgInterval').value = interval;
                document.getElementById('lblInterval').innerText = interval;
                
                if (ft == 1) {
                    let nid = []; for(let i=0;i<10;i++) nid.push(dataVal.getUint8(i).toString(16).padStart(2,'0'));
                    document.getElementById('cfgNid').value = nid.join('');
                    let iid = []; for(let i=0;i<6;i++) iid.push(dataVal.getUint8(10+i).toString(16).padStart(2,'0'));
                    document.getElementById('cfgIid').value = iid.join('');
                } else if (ft == 2) {
                    document.getElementById('cfgUrl').value = new TextDecoder().decode(new Uint8Array(dataVal.buffer, 0, 20)).replace(/\0/g, '');
                } else if (ft == 4) {
                    let uid = []; for(let i=0;i<16;i++) uid.push(dataVal.getUint8(i).toString(16).padStart(2,'0'));
                    document.getElementById('cfgUuid').value = uid.join('');
                    document.getElementById('cfgMaj').value = dataVal.getUint16(16, false); 
                    document.getElementById('cfgMin').value = dataVal.getUint16(18, false); 
                }

                document.getElementById('cfgFrameType').dispatchEvent(new Event('change'));
                log("Slot read successfully.");
            } catch(e) { log(e); }
        };

        document.getElementById('btnWriteSlot').onclick = async () => {
            try {
                let baseBuf = new ArrayBuffer(6);
                let baseView = new DataView(baseBuf);
                baseView.setUint8(0, parseInt(document.getElementById('cfgEnabled').value));
                
                let ft = parseInt(document.getElementById('cfgFrameType').value);
                baseView.setUint8(1, ft);
                baseView.setInt8(2, txPowerMap[parseInt(document.getElementById('cfgTxPower').value)]);
                baseView.setInt8(3, parseInt(document.getElementById('cfgRssi').value));
                baseView.setUint16(4, parseInt(document.getElementById('cfgInterval').value), true);
                await charBase.writeValue(baseBuf);

                let dataBuf = new ArrayBuffer(20);
                let dataView = new DataView(dataBuf);
                
                if (ft == 1) {
                    let nid = document.getElementById('cfgNid').value.padEnd(20, '0');
                    for(let i=0;i<10;i++) dataView.setUint8(i, parseInt(nid.substr(i << 1, 2), 16));
                    let iid = document.getElementById('cfgIid').value.padEnd(12, '0');
                    for(let i=0;i<6;i++) dataView.setUint8(10+i, parseInt(iid.substr(i << 1, 2), 16));
                } else if (ft == 2) {
                    let urlStr = document.getElementById('cfgUrl').value.substring(0, 20);
                    let urlBytes = new TextEncoder().encode(urlStr);
                    new Uint8Array(dataBuf).set(urlBytes);
                } else if (ft == 4) {
                    let uhex = document.getElementById('cfgUuid').value.padEnd(32, '0');
                    for(let i=0;i<16;i++) dataView.setUint8(i, parseInt(uhex.substr(i << 1, 2), 16));
                    dataView.setUint16(16, parseInt(document.getElementById('cfgMaj').value), false);
                    dataView.setUint16(18, parseInt(document.getElementById('cfgMin').value), false);
                }
                await charData.writeValue(dataBuf);
                log("RAM write complete.");
            } catch(e) { log(e); }
        };

        document.getElementById('btnReboot').onclick = async () => { await charCmd.writeValue(new Uint8Array([1])); log("Saving to Flash & Rebooting..."); };
        document.getElementById('btnFactory').onclick = async () => { await charCmd.writeValue(new Uint8Array([2])); log("Wiping..."); };
    </script>
</body>
</html>
